<!DOCTYPE html>
<html>
<head>
  <title>Price Editor</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    .item {
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input {
      width: 70px;
      padding: 5px;
    }

    button {
      padding: 5px 10px;
      margin-left: 10px;
      border: none;
      background: green;
      color: white;
      border-radius: 5px;
    }

    small {
      color: gray;
    }
  </style>
</head>
<body>

<h2>🥦 Vegetable & Fruit Price Editor</h2>

<div id="list"></div>

<script>
const API = "/api/items";

function formatTime(time) {
  if (!time) return "Not updated";

  const date = new Date(time);
  return date.toLocaleString();
}

async function loadItems() {
  const res = await fetch(API);
  const json = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  json.data.forEach(item => {
    container.innerHTML += `
      <div class="item">
        ${item.image} <b>${item.name}</b> (${item.name_ml}) <br/>
        ₹ <input type="number" value="${item.price}" id="price-${item.id}" />
        <button onclick="updatePrice(${item.id})">Update</button>
        <br/>
        <small>🕒 Last updated: ${formatTime(item.updated_at)}</small>
      </div>
    `;
  });
}

async function updatePrice(id) {
  const price = document.getElementById(`price-${id}`).value;

  await fetch(API, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id: id,
      price: Number(price)
    })
  });

  loadItems(); // 🔥 auto refresh
}

loadItems();
</script>

</body>
</html>
