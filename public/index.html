<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHD | Advanced Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

<div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-80 text-center">
        <h2 class="text-xl font-bold mb-4">GHD Login</h2>
        <input type="password" id="pass" placeholder="Password" class="w-full border p-3 rounded-lg mb-4 text-center">
        <button onclick="login()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold">Access</button>
    </div>
</div>

<div id="main-ui" class="hidden max-w-5xl mx-auto p-4 pb-20">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
        <h1 class="text-xl font-black text-emerald-700 uppercase tracking-tight">Management Portal</h1>
        <button onclick="saveAllChanges()" id="save-btn" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-emerald-700 transition">
            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save All Changes
        </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                <tr>
                    <th class="p-4">Image</th>
                    <th class="p-4">Names (EN / ML)</th>
                    <th class="p-4">Price (₹)</th>
                    <th class="p-4">Unit</th>
                    <th class="p-4">Actions</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    let db = [];
    const IMG_BASE = "https://raw.githubusercontent.com/usernameplay/PRICE-UPDATE/refs/heads/main/vegimg/";

    function login() {
        if(document.getElementById('pass').value === "ghd123") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            loadData();
        } else { alert("Wrong Password!"); }
    }

    async function loadData() {
        const r = await fetch('/api/veg');
        db = await r.json();
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = db.map((item, index) => `
            <tr class="border-b last:border-0 hover:bg-slate-50 transition">
                <td class="p-4">
                    <img src="${item.image}" class="w-12 h-12 rounded object-cover border bg-slate-100" 
                         onclick="changeImage(${index})" title="Click to change image link" 
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/2329/2329903.png'">
                </td>
                <td class="p-4">
                    <input type="text" value="${item.name}" onchange="updateLocal(${index}, 'name', this.value)" class="block font-bold text-slate-700 bg-transparent outline-none w-full border-b border-transparent focus:border-emerald-300">
                    <input type="text" value="${item.name_ml}" onchange="updateLocal(${index}, 'name_ml', this.value)" class="block text-sm text-slate-500 bg-transparent outline-none w-full border-b border-transparent focus:border-emerald-300">
                </td>
                <td class="p-4">
                    <input type="number" value="${item.price}" onchange="updateLocal(${index}, 'price', this.value)" class="w-20 p-2 rounded border border-slate-200 font-bold text-center focus:ring-2 focus:ring-emerald-500 outline-none">
                </td>
                <td class="p-4">
                    <input type="text" value="${item.unit}" onchange="updateLocal(${index}, 'unit', this.value)" class="w-20 p-2 text-sm text-slate-500 bg-transparent outline-none border-b border-transparent focus:border-emerald-300">
                </td>
                <td class="p-4">
                    <button onclick="deleteItem(${index})" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function updateLocal(index, field, value) {
        db[index][field] = value;
        console.log("Locally updated:", db[index]);
    }

    function changeImage(index) {
        const currentFile = db[index].image.split('/').pop();
        const newFile = prompt("Enter new image filename (from GitHub):", currentFile);
        if(newFile) {
            db[index].image = IMG_BASE + newFile;
            renderTable();
        }
    }

    async function saveAllChanges() {
        const btn = document.getElementById('save-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...';
        btn.disabled = true;

        const res = await fetch('/api/save-all', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(db)
        });

        if(res.ok) {
            alert("All changes synchronized to database!");
            loadData();
        }
        btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save All Changes';
        btn.disabled = false;
    }

    function deleteItem(index) {
        if(confirm("Delete this item?")) {
            db.splice(index, 1);
            renderTable();
        }
    }
</script>
</body>
</html>
