<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHD Vegetable Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2e7d32; margin-bottom: 20px; }
        .item { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 15px 0; }
        .emoji { font-size: 24px; margin-right: 15px; }
        .info { flex-grow: 1; }
        .info strong { display: block; font-size: 16px; }
        .info small { color: #888; font-size: 12px; }
        .price-box { display: flex; align-items: center; }
        .price-input { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-weight: bold; }
        button { background: #2e7d32; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; margin-left: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h2>GHD Veg Price Admin</h2>
    <div id="list">Loading...</div>
</div>

<script>
    async function loadData() {
        const res = await fetch('/api/veg');
        const data = await res.json();
        const div = document.getElementById('list');
        div.innerHTML = '';
        
        if(data.length === 0) {
            div.innerHTML = '<p style="text-align:center">No data found. Visit <a href="/api/setup">Setup</a> first.</p>';
            return;
        }

        data.forEach(item => {
            div.innerHTML += `
                <div class="item">
                    <div class="emoji">${item.emoji}</div>
                    <div class="info">
                        <strong>${item.name_ml} (${item.name_en})</strong>
                        <small>Unit: ${item.unit} | Last Update: ${item.updated_at}</small>
                    </div>
                    <div class="price-box">
                        <input type="number" id="p-${item.id}" class="price-input" value="${item.price}">
                        <button onclick="updatePrice(${item.id})">OK</button>
                    </div>
                </div>`;
        });
    }

    async function updatePrice(id) {
        const p = document.getElementById(`p-${id}`).value;
        const res = await fetch('/api/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id, price: p})
        });
        if(res.ok) {
            alert("Price Updated!");
            loadData();
        }
    }
    loadData();
</script>
</body>
</html>
