<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHD Color Pro | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #f8fafc; }
        .gradient-text { background: linear-gradient(90deg, #4ade80, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .vibrant-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #10b981; }
        .btn-gradient { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.5); }
        .prod-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950">
    <div class="glass p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm border-emerald-500/20 text-center">
        <div class="w-24 h-24 bg-gradient-to-tr from-emerald-500 to-blue-500 rounded-3xl flex items-center justify-center mx-auto mb-8 rotate-3 shadow-xl">
            <i class="fa-solid fa-key text-white text-4xl"></i>
        </div>
        <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter">Admin <span class="text-emerald-400">Access</span></h2>
        <input type="password" id="pass" placeholder="••••••" class="w-full bg-slate-800/50 border border-slate-700 px-6 py-4 rounded-2xl mb-6 text-center text-2xl tracking-[0.5em] outline-none">
        <button onclick="checkAuth()" class="w-full btn-gradient text-white font-black py-4 rounded-2xl text-lg uppercase tracking-widest">Login</button>
    </div>
</div>

<div id="app-content" class="hidden max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-black tracking-tight">GHD <span class="gradient-text">COLOR PRO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Inventory Management</p>
        </div>
        <div class="flex gap-3">
            <button onclick="saveAll()" id="save-btn" class="btn-gradient px-6 py-3 rounded-xl font-black text-xs uppercase tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Sync
            </button>
            <button onclick="location.reload()" class="bg-slate-800 p-3 rounded-xl hover:text-red-400">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="vibrant-card p-4 rounded-2xl">
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Total Items</p>
            <h3 id="stat-count" class="text-2xl font-black">0</h3>
        </div>
        <button onclick="addNewRow()" class="bg-emerald-500/10 border-2 border-dashed border-emerald-500/30 rounded-2xl flex items-center justify-center gap-2 text-emerald-400 font-black uppercase text-xs hover:bg-emerald-500 hover:text-white transition-all">
            <i class="fa-solid fa-plus-circle"></i> Add New
        </button>
    </div>

    <div class="space-y-3" id="product-list"></div>
</div>

<script>
    let localDB = [];
    const IMG_ROOT = "https://raw.githubusercontent.com/usernameplay/PRICE-UPDATE/refs/heads/main/vegimg/";
    const API_BASE = "http://127.0.0.1:5000/api"; // നിങ്ങളുടെ ഫ്ലാസ്ക് URL ഇവിടെ നൽകുക

    function checkAuth() {
        if(document.getElementById('pass').value === "ghd123") {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            loadData();
        } else { alert("Access Denied!"); }
    }

    async function loadData() {
        try {
            const res = await fetch(`${API_BASE}/veg`);
            localDB = await res.json();
            updateStats();
            render();
        } catch(e) { console.error("Load failed", e); }
    }

    function render() {
        const container = document.getElementById('product-list');
        container.innerHTML = localDB.map((item, idx) => `
            <div class="vibrant-card glass p-3 rounded-2xl flex items-center gap-4 group">
                <div class="relative flex-shrink-0">
                    <img src="${item.image}" class="prod-img bg-slate-800 border border-slate-700" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2329/2329903.png'">
                    <button onclick="editImg(${idx})" class="absolute -bottom-1 -right-1 bg-emerald-500 text-white w-5 h-5 rounded-md flex items-center justify-center text-[10px] shadow-lg">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                </div>

                <div class="flex-grow min-w-0">
                    <input type="text" value="${item.name_ml}" onchange="updateVal(${idx}, 'name_ml', this.value)" class="block w-full bg-transparent text-base font-bold text-white outline-none focus:text-emerald-400 leading-tight">
                    <div class="flex items-center gap-3 mt-0.5">
                        <select onchange="updateVal(${idx}, 'category', this.value)" class="bg-slate-800 text-[9px] font-bold text-blue-400 uppercase px-1.5 py-0.5 rounded border border-slate-700 outline-none">
                            <option value="Vegetable" ${item.category === 'Vegetable' ? 'selected' : ''}>Veg</option>
                            <option value="Fruit" ${item.category === 'Fruit' ? 'selected' : ''}>Fruit</option>
                        </select>
                        <input type="text" value="${item.unit || '1 KG'}" onchange="updateVal(${idx}, 'unit', this.value)" class="bg-transparent text-[10px] font-bold text-slate-400 outline-none w-10 uppercase">
                        <span class="text-[9px] text-slate-500"><i class="fa-solid fa-clock mr-1"></i>${item.last_updated || 'No Date'}</span>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <div class="bg-slate-800 px-2 py-1.5 rounded-xl border border-slate-700 flex items-center">
                        <span class="text-emerald-500 font-bold text-sm mr-1">₹</span>
                        <input type="number" value="${item.price}" onchange="updateVal(${idx}, 'price', this.value)" class="w-10 bg-transparent text-lg font-black text-white outline-none">
                    </div>
                    <button onclick="deleteRow(${idx})" class="text-slate-600 hover:text-red-500 p-2">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                </div>
            </div>
        `).join('');
    }

    function updateVal(i, k, v) { localDB[i][k] = v; }

    function editImg(i) {
        let n = prompt("Image Filename:", localDB[i].image.split('/').pop());
        if(n) { localDB[i].image = IMG_ROOT + n; render(); }
    }

    function addNewRow() {
        localDB.unshift({
            id: Date.now(), name_ml: "പുതിയ ഐറ്റം", category: "Vegetable",
            price: 0, unit: "1 KG", image: IMG_ROOT + "tomato-256.png", last_updated: "Just Now"
        });
        render(); updateStats();
    }

    function deleteRow(i) {
        if(confirm("Delete this item?")) { localDB.splice(i, 1); render(); updateStats(); }
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        try {
            const res = await fetch(`${API_BASE}/save-all`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(localDB)
            });
            const data = await res.json();
            alert("Updated Successfully!");
            loadData(); // പുതിയ സമയം കാണിക്കാൻ റീലോഡ് ചെയ്യുന്നു
        } catch(e) { alert("Sync Failed!"); }
        btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Sync';
    }

    function updateStats() { document.getElementById('stat-count').innerText = localDB.length; }
</script>
</body>
</html>
