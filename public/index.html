<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHD Veg Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2e7d32; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .item-card { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .item-card img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #f9f9f9; }
        .details { flex-grow: 1; }
        .details strong { display: block; font-size: 16px; color: #333; }
        .details span { font-size: 13px; color: #777; }
        .update-sec { display: flex; flex-direction: column; align-items: flex-end; }
        .price-input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 5px; }
        button { background: #2e7d32; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .last-update { font-size: 10px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GHD Vegetable Admin</h2>
    <input type="text" id="search" class="search-bar" placeholder="Search vegetables..." onkeyup="filterItems()">
    <div id="veg-list">Loading products...</div>
</div>

<script>
    let vegData = [];

    async function loadData() {
        const res = await fetch('/api/veg');
        vegData = await res.json();
        renderList(vegData);
    }

    function renderList(items) {
        const listDiv = document.getElementById('veg-list');
        listDiv.innerHTML = '';
        if(items.length === 0) {
            listDiv.innerHTML = '<p>No data. Visit <a href="/api/setup">Setup</a>.</p>';
            return;
        }
        items.forEach(item => {
            listDiv.innerHTML += `
                <div class="item-card">
                    <img src="${item.image}" alt="img">
                    <div class="details">
                        <strong>${item.name_ml}</strong>
                        <span>${item.name} (${item.unit})</span>
                        <div class="last-update">Updated: ${item.updated_at}</div>
                    </div>
                    <div class="update-sec">
                        <input type="number" id="p-${item.id}" class="price-input" value="${item.price}">
                        <button onclick="updatePrice(${item.id})">OK</button>
                    </div>
                </div>`;
        });
    }

    function filterItems() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = vegData.filter(v => 
            v.name.toLowerCase().includes(term) || v.name_ml.toLowerCase().includes(term)
        );
        renderList(filtered);
    }

    async function updatePrice(id) {
        const p = document.getElementById(`p-${id}`).value;
        const res = await fetch('/api/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id, price: p})
        });
        if(res.ok) {
            alert("Updated!");
            loadData();
        }
    }
    loadData();
</script>
</body>
</html>
