<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHD Vegetable Admin</title>
    <style>
        :root { --green: #2e7d32; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; color: var(--green); margin-bottom: 15px; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .item-card { display: flex; align-items: center; background: #fff; border-bottom: 1px solid #eee; padding: 10px 0; }
        .emoji { font-size: 30px; margin-right: 15px; }
        .details { flex-grow: 1; }
        .details strong { display: block; font-size: 16px; color: #333; }
        .details span { font-size: 12px; color: #777; }
        .update-sec { display: flex; flex-direction: column; align-items: flex-end; }
        .price-input { width: 70px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 5px; }
        button { background: var(--green); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .last-update { font-size: 10px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>GHD Vegetable Admin</h2>
    </div>
    
    <input type="text" id="search" class="search-bar" placeholder="പച്ചക്കറിയുടെ പേര് തിരയുക..." onkeyup="filterItems()">
    
    <div id="veg-list">Loading...</div>
</div>

<script>
    let vegData = [];

    async function loadData() {
        const res = await fetch('/api/veg');
        vegData = await res.json();
        displayItems(vegData);
    }

    function displayItems(items) {
        const listDiv = document.getElementById('veg-list');
        listDiv.innerHTML = '';
        
        if(items.length === 0) {
            listDiv.innerHTML = '<p style="text-align:center">ഡാറ്റ ലഭ്യമല്ല. <a href="/api/setup">ഇവിടെ ക്ലിക്ക് ചെയ്ത് സെറ്റപ്പ് ചെയ്യുക.</a></p>';
            return;
        }

        items.forEach(item => {
            listDiv.innerHTML += `
                <div class="item-card">
                    <div class="emoji">${item.emoji}</div>
                    <div class="details">
                        <strong>${item.name_ml}</strong>
                        <span>${item.name_en} (${item.unit})</span>
                        <div class="last-update">Update: ${item.updated_at}</div>
                    </div>
                    <div class="update-sec">
                        <input type="number" id="p-${item.id}" class="price-input" value="${item.price}">
                        <button onclick="updatePrice(${item.id})">Update</button>
                    </div>
                </div>
            `;
        });
    }

    function filterItems() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = vegData.filter(v => 
            v.name_en.toLowerCase().includes(term) || 
            v.name_ml.toLowerCase().includes(term) || 
            v.name_manglish.toLowerCase().includes(term)
        );
        displayItems(filtered);
    }

    async function updatePrice(id) {
        const price = document.getElementById(`p-${id}`).value;
        const res = await fetch('/api/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id, price: price})
        });
        if(res.ok) {
            alert("വില അപ്‌ഡേറ്റ് ചെയ്തു!");
            loadData();
        }
    }

    loadData();
</script>

</body>
</html>
